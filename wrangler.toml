name = "lizardflap"
main = "worker/index.js"
compatibility_date = "2025-01-01"

# Static frontend produced by `npm run build`. Cloudflare serves these
# first; the Worker only runs for requests that don't match an asset
# (e.g. /api/*).
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database created with:
#   wrangler d1 create lizard-flap-leaderboard
# Schema lives in migrations/0001_init.sql; apply with:
#   wrangler d1 migrations apply lizard-flap-leaderboard --remote
[[d1_databases]]
binding = "DB"
database_name = "lizard-flap-leaderboard"
database_id = "ea854f62-4f8d-4ac5-b789-3ebdd9c34b76"
migrations_dir = "migrations"
